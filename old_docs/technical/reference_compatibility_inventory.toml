notes = "Shader3D exposes Pythonic set_uniform, version, copy_to_context, inspect_hooks, and modify methods. Browser WebGL context-copy semantics are represented as backend-neutral value copies. Shader variant helper names are deferred stubs until a native shader variant design exists."

[[entry]]
