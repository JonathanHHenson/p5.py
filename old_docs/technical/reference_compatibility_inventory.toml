p5_py = ["describe", "describe_element", "grid_output", "text_output"]
status = "pythonic_equivalent"
module = "p5.api.global_mode"
notes = "Native metadata/test hooks are supported. Browser DOM/screen-reader output semantics remain excluded."

[[entry]]
