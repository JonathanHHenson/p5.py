p5_py = ["ambient_light", "directional_light", "point_light", "lights", "no_lights", "spot_light", "image_light", "panorama", "light_falloff", "specular_color", "normal_material", "ambient_material", "specular_material", "shininess", "emissive_material", "metalness", "texture", "texture_mode", "texture_wrap"]
