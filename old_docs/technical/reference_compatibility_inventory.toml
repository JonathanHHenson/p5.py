# Durable p5.js beta reference compatibility inventory for p5-py.
#
# Status values: supported, partial, pythonic_equivalent, deferred, excluded,
# not_applicable. Public p5-py names are snake_case only; browser/DOM-only
# names are classified but not implemented unless a native Python equivalent is
# useful and explicit.

[metadata]
source = "https://beta.p5js.org/reference/"
policy_doc = "docs/technical/reference_gap_closure.md"

[[entry]]
reference = "red/green/blue/alpha"
p5_py = ["red", "green", "blue", "alpha"]
status = "supported"
module = "p5.core.color"
notes = "RGBA component readers over immutable Color values."

[[entry]]
reference = "hue/saturation/brightness/lightness"
p5_py = ["hue", "saturation", "brightness", "lightness"]
status = "supported"
module = "p5.core.color"
notes = "Return degree/percentage values from the stored RGB color."

[[entry]]
reference = "paletteLerp"
p5_py = ["palette_lerp"]
status = "supported"
module = "p5.core.color"
notes = "Snake_case helper interpolates across a Python iterable of Color values."

[[entry]]
reference = "abs/ceil/exp/floor/log/pow/round/sqrt"
p5_py = ["abs_", "ceil", "exp", "floor", "log", "pow_", "round_", "sqrt"]
status = "pythonic_equivalent"
module = "p5.core.math"
notes = "Names that would shadow important Python built-ins use trailing underscore aliases."

[[entry]]
reference = "boolean/byte/char/float/hex/int/str/unchar/unhex/nf/nfc/nfp/nfs/shuffle/splitTokens"
p5_py = ["boolean", "byte", "char", "float_", "hex_", "int_", "str_", "unchar", "unhex", "nf", "nfc", "nfp", "nfs", "shuffle", "split_tokens"]
status = "pythonic_equivalent"
module = "p5.core.data"
notes = "Python-native conversions preserve p5-style portability while avoiding surprising built-in shadowing for float, hex, int, and str."

[[entry]]
reference = "p5.Vector indexed access, angleBetween, setHeading, getValue/setValue, toString, rem, equals, clampToZero, slerp, reflect, random2D/random3D, fromAngles"
p5_py = ["Vector"]
status = "supported"
module = "p5.core.vector"
notes = "Vector includes Python indexing/operators, snake_case methods, angular helpers, component get/set helpers, string formatting, and compatibility-only class attributes where useful. Public package exports remain snake_case only."

[[entry]]
reference = "day/month/year/hour/minute/second/getTargetFrameRate/windowWidth/windowHeight/displayWidth/displayHeight/focused/cursor/noCursor"
p5_py = ["day", "month", "year", "hour", "minute", "second", "get_target_frame_rate", "window_width", "window_height", "display_width", "display_height", "focused", "cursor", "no_cursor"]
status = "partial"
module = "p5.api.global_mode"
notes = "Native canvas environment equivalents. Cursor APIs are safe no-ops until native backends expose cursor control."

[[entry]]
reference = "getURL/getURLPath/getURLParams/localStorage"
p5_py = ["get_url", "get_url_path", "get_url_params", "local_storage", "create_blob", "save_blob", "load_blob"]
status = "excluded"
module = "p5.api.compatibility"
notes = "Browser URL/storage and Blob/client-side-save state are intentionally excluded; use urllib.parse, bytes/io helpers, or explicit local persistence."

[[entry]]
reference = "accelerationX/Y/Z, pAccelerationX/Y/Z, rotationX/Y/Z, pRotationX/Y/Z, deviceMoved/deviceTurned/deviceShaken"
p5_py = ["acceleration_x", "acceleration_y", "acceleration_z", "previous_acceleration_x", "previous_acceleration_y", "previous_acceleration_z", "rotation_x", "rotation_y", "rotation_z", "previous_rotation_x", "previous_rotation_y", "previous_rotation_z", "orientation_x", "orientation_y", "orientation_z", "device_moved", "device_turned", "device_shaken"]
status = "deferred"
module = "p5.api.compatibility"
notes = "Native sensor provider not selected. Public stubs raise package-specific errors."

[[entry]]
reference = "DOM elements, form/file inputs, p5.XML, p5.Table, p5.TableRow"
p5_py = ["create_div", "create_button", "create_input", "create_slider", "create_checkbox", "create_select", "create_radio", "create_color_picker", "create_file_input", "select", "select_all", "remove_elements", "load_xml", "load_table", "table_row"]
status = "excluded"
