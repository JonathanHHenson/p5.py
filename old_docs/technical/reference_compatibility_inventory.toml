[[entry]]
reference = "beginClip/clip/endClip/tint/noTint/filter/saveFrames/saveGif"
p5_py = ["Image", "create_image", "get", "set", "copy", "filter", "save_canvas", "begin_clip", "clip", "end_clip", "tint", "no_tint", "save_frames", "save_gif"]
status = "partial"
module = "p5.assets.image"
notes = "Image filters, image load/update pixels helpers, canvas get/set/copy/filter helpers, and export helpers exist for local image/canvas workflows. Image-local blend, HiDPI density, animated frame controls, canvas clipping, tint, animated frame export, and GIF controls are explicit deferred APIs pending Rust canvas semantics."

[[entry]]
reference = "textBounds/textDirection/textWrap/textWeight/textProperties/textProperty/fontBounds/fontWidth/fontAscent/fontDescent"
p5_py = ["text", "text_width", "text_ascent", "text_descent", "text_font", "text_style", "text_bounds", "text_direction", "text_wrap", "text_weight", "text_properties", "text_property", "font_bounds", "font_width", "font_ascent", "font_descent", "text_to_points", "text_to_paths", "text_to_contours", "text_to_model"]
status = "partial"
module = "p5.api.global_mode"
notes = "Text bounds/properties and font metric wrappers are supported over the current native width/ascent/descent contract with bounded renderer-side measurement caching. Font outline/path extraction remains explicit deferred Font methods."

[[entry]]
reference = "createGraphics/framebuffer/noCanvas/drawingContext"
p5_py = ["create_graphics", "create_framebuffer", "drawing_context", "no_canvas"]
status = "deferred"
module = "p5.api.compatibility"
notes = "Public stubs raise package-specific deferred errors. Offscreen graphics/framebuffer ownership is documented in docs/technical/offscreen_graphics_framebuffer_design.md; drawingContext remains excluded because public APIs must not expose Rust or browser canvas internals."

[[entry]]
reference = "mouseClicked/doubleClicked/mouseDragged/mouseMoved/mouseReleased/mouseWheel/keyPressed/keyReleased/keyTyped/window mouse values/code semantics"
p5_py = ["mouse_x", "mouse_y", "pmouse_x", "pmouse_y", "moved_x", "moved_y", "mouse_is_pressed", "mouse_button", "key", "key_code", "key_is_pressed", "key_is_down"]
