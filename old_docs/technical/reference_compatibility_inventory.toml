p5_py = ["webgpu_context", "create_storage_buffer", "update_storage_buffer", "read_storage_buffer", "create_compute_shader", "dispatch_compute", "strands"]
status = "deferred"
module = "p5.api.compatibility"
notes = "Deferred unless the Rust canvas runtime grows a safe native GPU abstraction; p5.strands browser-specific semantics are excluded through an explicit public stub."

[[entry]]
