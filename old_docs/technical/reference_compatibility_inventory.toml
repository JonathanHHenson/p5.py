[[entry]]
reference = "p5.Shader hook inspection/modification/context-copy APIs, filter/image/stroke/color/material shader variants"
p5_py = ["load_shader", "create_shader", "shader", "reset_shader", "create_filter_shader", "filter_shader", "create_image_shader", "create_stroke_shader", "create_color_shader", "create_material_shader", "normal_shader"]
