[[entry]]
reference = "spline/splinePoint/splineTangent/splineVertex/splineProperties/beginContour/endContour/normal/vertexProperty"
p5_py = ["begin_shape", "vertex", "bezier_vertex", "quadratic_vertex", "spline_vertex", "end_shape", "spline", "spline_point", "spline_tangent", "spline_property", "spline_properties", "begin_contour", "end_contour", "normal", "vertex_property"]
