[[entry]]
reference = "touches/touchStarted/touchMoved/touchEnded/pointer lock"
p5_py = ["touches", "request_pointer_lock", "exit_pointer_lock"]
status = "partial"
module = "p5.events.input_state"
notes = "Touch state is native-runtime backed. Browser pointer lock is excluded via explicit public stubs unless a native equivalent is deliberately designed."

