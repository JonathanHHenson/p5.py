[my_pbi]
title = "Prepare release and packaging workflow"
description = '''
As a maintainer,
I want predictable packaging and releases,
So that users can install p5-py reliably.
'''
acceptance_criteria = '''
The project can build source distributions and wheels, declares optional dependency groups, includes license/readme metadata, and documents release steps. Rust packaging is handled when enabled.
'''
priotity = 'medium'

[my_pbi.task_1]
order = 1
description = '''
Update packaging metadata, README, classifiers, dependency groups, and package discovery.
'''

[my_pbi.task_2]
order = 2
description = '''
Add build checks for pure-Python distributions and maturin-backed wheels.
'''

[my_pbi.task_3]
order = 3
description = '''
Document versioning, changelog, release validation, and publishing workflow.
'''
