[my_pbi]
title = "Set up testing, linting, formatting, and typing"
description = '''
As a maintainer,
I want automated quality checks,
So that the package remains reliable as the API surface grows.
'''
acceptance_criteria = '''
`pytest`, `ruff`, and static typing checks are configured. Tests cover unit, contract, golden, compatibility, and integration layers. Common commands are documented.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Add pytest structure for unit, contract, golden, parity, and integration tests.
'''

[my_pbi.task_2]
order = 2
description = '''
Configure ruff formatting/linting and type checking.
'''

[my_pbi.task_3]
order = 3
description = '''
Add CI-friendly commands for fast tests, full tests, linting, and typing.
'''

[my_pbi.task_4]
order = 4
description = '''
Document test-writing guidelines.
'''
