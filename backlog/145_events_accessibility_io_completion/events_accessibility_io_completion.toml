[my_pbi]
title = "Complete native events, accessibility metadata, and local IO parity"
description = '''
As a p5-py sketch author building interactive and data-driven sketches,
I want native event callbacks, accessibility metadata hooks, and Pythonic local IO helpers,
So that browser-specific reference concepts are either supported natively or fail clearly with documented alternatives.
'''
acceptance_criteria = '''
Pointer, keyboard, touch, device sensor, accessibility, and IO entries currently classified as partial/deferred are implemented or explicitly classified with package-specific errors. Native event callbacks include mouse/key/touch callback parity where the canvas runtime can provide events. Accessibility helpers use native metadata/test hooks rather than DOM output. Local IO includes bytes and writer-style workflows where useful. Browser pointer lock, Blob/client-side-save, XML, Table, and TableRow remain excluded unless project policy changes. Tests cover event dispatch, state values, unsupported stubs, and local file behavior.
'''
priotity = 'medium'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Complete native pointer callback parity: `mouse_clicked`, `double_clicked`, `mouse_dragged`, `mouse_moved`, `mouse_pressed`, `mouse_released`, `mouse_wheel`, window mouse coordinates, previous window mouse values, and mouse button state semantics.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Complete native keyboard callback parity: `key_pressed`, `key_released`, `key_typed`, `code` semantics, printable character handling, and key repeat behavior.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Expand touch event tests and APIs for touch start/move/end behavior while preserving the current normalized touch-list model.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Decide whether native pointer lock has a safe cross-platform equivalent; otherwise add explicit unsupported stubs and documentation for request/exit pointer lock names.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Design a native sensor provider interface for acceleration/orientation APIs or keep them deferred with stronger documentation and package-specific stubs for all common p5.js sensor names.
'''

