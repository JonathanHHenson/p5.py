[my_pbi]
title = "Implement WEBGL-style public APIs and generated 3D primitives"
description = '''
As a creative coder,
I want camera, projection, light, material, texture, and primitive APIs,
So that I can write Python-native 3D sketches with familiar p5.js-inspired controls.
'''
acceptance_criteria = '''
The public API exposes snake_case 3D functions only. Camera/projection, orbit control, light/material, software texture binding, and generated primitives such as `plane`, `box`, and `sphere` work on the current software WEBGL path, are capability-gated elsewhere, and are covered by examples and tests.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Replace the deferred stubs for `create_camera`, `camera`, `perspective`, `ortho`, and `orbit_control` with public APIs that delegate through `SketchContext` to the current WEBGL implementation.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Implement light, material, and texture APIs including `ambient_light`, `directional_light`, `point_light`, `normal_material`, `ambient_material`, `specular_material`, `shininess`, and `texture`.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Add generated mesh builders and drawing support for `plane`, `box`, and `sphere` before file-based model loading.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Add compatibility-matrix updates and examples/tests that demonstrate the implemented snake_case 3D public APIs.
'''
