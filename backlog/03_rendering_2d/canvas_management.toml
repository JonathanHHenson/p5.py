[my_pbi]
title = "Implement canvas creation and sizing"
description = '''
As a sketch author,
I want to create and resize canvases,
So that sketches can control their drawing area like p5.js.
'''
acceptance_criteria = '''
`create_canvas`, `resize_canvas`, width, height, display dimensions, and pixel density APIs work in headless mode and are prepared for interactive backends. p5.js aliases are available.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Implement canvas state and `create_canvas` / `resize_canvas` behavior.
'''

[my_pbi.task_2]
order = 2
description = '''
Expose `width`, `height`, display dimensions, and pixel-density getters/setters through context and global mode.
'''

[my_pbi.task_3]
order = 3
description = '''
Add tests for resizing, renderer recreation or buffer resizing, and state consistency.
'''
