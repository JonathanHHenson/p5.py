[my_pbi]
title = "Draw basic 2D primitives"
description = '''
As a creative coder,
I want to draw points, lines, rectangles, ellipses, triangles, quads, and arcs,
So that I can create basic 2D sketches.
'''
acceptance_criteria = '''
The renderer and public API support `point`, `line`, `rect`, `square`, `ellipse`, `circle`, `triangle`, `quad`, and `arc` with p5-style modes where applicable. Golden tests cover representative primitives.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Implement primitive APIs and renderer methods for points, lines, rectangles, ellipses, triangles, quads, and arcs.
'''

[my_pbi.task_2]
order = 2
description = '''
Implement `rect_mode`, `ellipse_mode`, and arc mode handling for supported modes.
'''

[my_pbi.task_3]
order = 3
description = '''
Add golden tests for each primitive with fill, stroke, and no-fill/no-stroke combinations.
'''
