[my_pbi]
title = "Implement native Pyglet parity for pixel, blend, and compositing APIs"
description = '''
As an interactive sketch author using the native Pyglet backend,
I want the pixel-buffer and compositing APIs that work in headless/Pillow to work natively,
So that sketches can use the same rendering features interactively without switching backends.
'''
acceptance_criteria = '''
The native Pyglet renderer supports the currently Pillow-only rendering features introduced for pixels and compositing: `update_pixels`, mutable `pixels` upload, `blend_mode` for primitives/images/text, `blend`, `erase`, `no_erase`, and all advertised blend constants. Capability flags accurately reflect native support. Unsupported native limitations, if any remain, raise clear package-specific capability errors and are documented. Deterministic tests or fake-Pyglet unit tests cover behavior, with manual interactive smoke-test instructions where GPU behavior cannot be fully tested headlessly.
'''
priotity = 'medium'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Audit native Pyglet versus Pillow renderer parity for rendering APIs, including `update_pixels`, `pixels` mutation/upload, `blend_mode`, `blend`, `erase`, `no_erase`, semi-transparent alpha compositing, image/text blend behavior, framebuffer readback/export orientation, and transformed image semantics tracked in epic 062.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Design the native Pyglet compositing architecture: choose GL blend functions/equations, offscreen framebuffer or texture passes where needed, and the fallback/error strategy for modes that cannot be implemented directly with fixed-function blending.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Implement `blend_mode` support in `PygletRenderer` for primitives, images, and text, including `BLEND`, `REPLACE`, `ADD`, `DARKEST`, `LIGHTEST`, `DIFFERENCE`, `EXCLUSION`, `MULTIPLY`, and `SCREEN`, or explicitly capability-gate any mode that requires a later shader/framebuffer pass.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Implement native `erase` and `no_erase` behavior using alpha compositing, destination-alpha updates, stencil/mask rendering, or an offscreen framebuffer strategy so erased regions preserve transparent alpha in `save_canvas` and `load_pixels`.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Implement native `blend` region compositing for canvas-to-canvas and image-to-canvas sources, including source rectangle cropping, destination scaling, HiDPI physical-pixel handling, and top-left p5 coordinate semantics.
'''

[my_pbi.task_6]
order = 6
status = 'TODO'
description = '''
Implement native `update_pixels` by uploading the p5 RGBA physical pixel buffer into a texture/framebuffer path, preserving channel order, pixel-density behavior, and subsequent native drawing compositing correctly over the uploaded pixels.
'''

[my_pbi.task_7]
order = 7
status = 'TODO'
description = '''
Update backend capability flags and error messages so the Pyglet backend advertises only modes and pixel operations that are actually implemented, and remove obsolete Pillow-only guidance once parity lands.
'''

[my_pbi.task_8]
order = 8
status = 'TODO'
description = '''
Add tests for native Pyglet rendering parity using fake Pyglet objects where possible, plus focused framebuffer/readback tests for blend, erase, `blend`, and `update_pixels`. Keep deterministic Pillow golden tests as the reference behavior.
'''

[my_pbi.task_9]
order = 9
status = 'TODO'
description = '''
Update docs and examples, including `docs/native_pyglet_renderer.md`, `docs/hidpi_rendering.md` if needed, and examples that currently default to headless because of Pillow-only compositing or pixel update support.
'''
