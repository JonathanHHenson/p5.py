[my_pbi]
title = "Implement drawing style state"
description = '''
As a sketch author,
I want fill, stroke, and style settings to behave like p5.js,
So that drawing calls produce expected visual output.
'''
acceptance_criteria = '''
`background`, `clear`, `fill`, `no_fill`, `stroke`, `no_stroke`, `stroke_weight`, `stroke_cap`, `stroke_join`, and style stack behavior are implemented and tested with the renderer.
'''
