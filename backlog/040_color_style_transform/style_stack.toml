order = 1
status = 'DONE'
description = '''
Create style state dataclasses for fill, stroke, stroke weight, caps, joins, blend mode, text style, and image mode.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Implement style mutation APIs and renderer style application.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Add tests for style persistence, no-fill/no-stroke behavior, and background clearing.
'''
