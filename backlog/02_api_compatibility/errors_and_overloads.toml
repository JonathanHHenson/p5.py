[my_pbi]
title = "Implement argument parsing and friendly errors"
description = '''
As a sketch author,
I want overloaded p5-style APIs to fail clearly when used incorrectly,
So that mistakes are easy to diagnose in Python.
'''
acceptance_criteria = '''
Common overloaded APIs use shared argument parsing helpers and raise package-specific exceptions with actionable messages. Tests cover invalid arity, invalid types, and unsupported features.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Create exception classes for context errors, unsupported features, backend capability errors, and argument validation.
'''

[my_pbi.task_2]
order = 2
description = '''
Implement reusable overload parsing utilities for color, random, geometry, image, text, and canvas APIs.
'''

[my_pbi.task_3]
order = 3
description = '''
Add validation tests for representative APIs with valid and invalid p5-style call shapes.
'''
