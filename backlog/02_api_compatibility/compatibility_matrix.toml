[my_pbi]
title = "Maintain a p5.js compatibility matrix"
description = '''
As a user migrating sketches,
I want to know which p5.js features are supported, partial, deferred, or excluded,
So that I can plan sketch ports confidently.
'''
acceptance_criteria = '''
A compatibility matrix documents each major p5.js API category, p5-py status, Pythonic equivalent where applicable, implementation notes, and exclusions. Deferred APIs raise clear errors if exposed.
'''
priotity = 'medium'

[my_pbi.task_1]
order = 1
description = '''
Create a structured compatibility data file grouped by lifecycle, drawing, color, transforms, images, text, input, math, vectors, pixels, 3D, sound, and data.
'''

[my_pbi.task_2]
order = 2
description = '''
Document excluded APIs including DOM, browser-only APIs, `p5.XML`, `p5.Table`, and `p5.TableRow`.
'''

[my_pbi.task_3]
order = 3
description = '''
Add tests ensuring exposed deferred APIs raise package-specific unsupported-feature exceptions.
'''
