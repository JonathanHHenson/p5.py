[my_pbi]
title = "Provide Pythonic names and p5.js aliases"
description = '''
As a Python user,
I want canonical snake_case APIs with familiar p5.js aliases,
So that the package is idiomatic without alienating p5.js users.
'''
acceptance_criteria = '''
Each public API has a documented canonical Python name. p5.js camelCase aliases are provided where useful. Alias behavior is tested and does not duplicate implementation logic.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Define naming policy for canonical Python APIs, p5 compatibility aliases, constants, and properties.
'''

[my_pbi.task_2]
order = 2
description = '''
Implement a centralized alias registry mapping camelCase names to snake_case implementations.
'''

[my_pbi.task_3]
order = 3
description = '''
Generate or validate documentation tables showing Pythonic names and p5.js aliases.
'''
