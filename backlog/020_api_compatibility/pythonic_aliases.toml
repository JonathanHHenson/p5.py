[my_pbi]
title = "Provide Pythonic snake_case public names"
description = '''
As a Python user,
I want canonical snake_case APIs without p5.js camelCase aliases,
So that the package is idiomatic and intentionally Pythonic.
'''
acceptance_criteria = '''
Each public API has a documented canonical Python name. p5.js camelCase aliases are not exported, and tests verify representative aliases remain absent from the public package surface.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Define naming policy for canonical Python APIs, constants, and properties.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Remove the centralized camelCase alias registry and rely on explicit snake_case exports.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Document the snake_case-only API policy and migration guidance for p5.js examples.
'''
