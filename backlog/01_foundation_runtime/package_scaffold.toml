[my_pbi]
title = "Create the Python package scaffold"
description = '''
As a library maintainer,
I want a clean Python package structure,
So that future p5-py features have an organized foundation.
'''
acceptance_criteria = '''
A `src/p5_py` package exists with organized modules for runtime, API, constants, exceptions, core systems, drawing, backends, events, assets, pixels, plugins, Rust integration, and testing helpers. The package imports without side effects and exposes an intentional public surface.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Create the `src/p5_py` layout and move away from a single `main.py` entry point.
'''

[my_pbi.task_2]
order = 2
description = '''
Define package modules for `api`, `core`, `drawing`, `backends`, `events`, `assets`, `pixels`, `plugins`, `rust`, and `testing`.
'''

[my_pbi.task_3]
order = 3
description = '''
Add package-level exports for initial runtime primitives without importing optional backends eagerly.
'''

[my_pbi.task_4]
order = 4
description = '''
Update project metadata for package discovery, optional dependencies, and development tooling.
'''
