[my_pbi]
title = "Define renderer and backend protocols"
description = '''
As a backend implementer,
I want stable protocol interfaces,
So that multiple native rendering backends can support the same public API.
'''
acceptance_criteria = '''
Protocols exist for renderers, interactive backends, headless backends, event sources, image surfaces, and capability reporting. Core runtime code depends on protocols rather than concrete backend classes.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Define a renderer protocol covering frame boundaries, primitives, paths, images, text, transforms, styles, pixels, and export.
'''

[my_pbi.task_2]
order = 2
description = '''
Define a backend protocol for lifecycle, canvas creation, event polling, frame presentation, and cleanup.
'''

[my_pbi.task_3]
order = 3
description = '''
Add capability reporting so unsupported features fail with actionable errors.
'''

[my_pbi.task_4]
order = 4
description = '''
Create contract tests that every renderer/backend implementation must satisfy.
'''
