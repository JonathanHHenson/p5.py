[my_pbi]
title = "Complete core 2D, clipping, tint, image, and canvas pixel parity"
description = '''
As a p5-py sketch author translating non-browser 2D sketches,
I want the remaining Python-relevant 2D shape, clipping, tint, image, and canvas pixel APIs,
So that common p5.js examples can run on the native canvas runtime without renderer-specific workarounds.
'''
acceptance_criteria = '''
Pythonic snake_case APIs are implemented for the remaining core 2D and image/canvas entries that make sense in p5-py, including spline helpers, contour support, clipping, tint/no_tint, canvas get/set/copy/filter helpers, save_frames/save_gif where feasible, and richer Image method parity. APIs that require unavailable Rust canvas semantics are implemented in the Rust canvas runtime first or remain package-specific deferred stubs with clear guidance. Pixel and image operations are benchmarked or reviewed for memory churn, deterministic headless tests cover behavior, and HiDPI pixel semantics are preserved.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Implement Catmull-Rom spline math and drawing APIs: `spline`, `spline_point`, `spline_tangent`, `spline_vertex`, and spline property helpers where they map cleanly to the current shape renderer.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Add custom shape contour support with `begin_contour` and `end_contour`, backed by native canvas path semantics and deterministic headless tests.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Implement backend-safe clipping and image tint state: `begin_clip`, `clip`, `end_clip`, `tint`, and `no_tint`, including renderer state push/pop behavior.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Add canvas-level pixel/image helpers `get`, `set`, `copy`, and `filter` while preserving physical-buffer HiDPI semantics for `load_pixels` and `update_pixels`.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Complete Image method parity where feasible, including `blend`, `load_pixels`, `update_pixels`, `pixel_density`, image `pixels`, and explicit animated GIF behavior for unsupported frame controls.
'''

[my_pbi.task_6]
order = 6
status = 'TODO'
description = '''
Implement or explicitly defer `save_frames` and `save_gif` based on native canvas runtime export capabilities, with bounded/headless tests for deterministic frame capture.
'''

[my_pbi.task_7]
order = 7
status = 'TODO'
description = '''
Profile representative large-image and canvas-pixel operations, minimize unnecessary buffer copies, and document any unavoidable copy boundaries between Python and Rust.
'''

[my_pbi.task_8]
order = 8
status = 'TODO'
description = '''
Update compatibility inventory, user docs, and technical rendering docs when these APIs move from partial/deferred to supported or Pythonic equivalent.
'''
