[my_pbi]
title = "Implement the Color class and color modes"
description = '''
As a sketch author,
I want p5-compatible color creation and color modes,
So that colors behave predictably across drawing APIs.
'''
acceptance_criteria = '''
`Color`, `color`, `color_mode`, channel accessors, and `lerp_color` support RGB, HSB, and HSL modes with configurable ranges. Common p5-style input overloads are validated and tested.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Implement normalized internal RGBA storage and mode-aware constructors.
'''

[my_pbi.task_2]
order = 2
description = '''
Support grayscale, RGB/RGBA, HSB/HSBA, HSL/HSLA, existing Color objects, and common string color inputs where practical.
'''

[my_pbi.task_3]
order = 3
description = '''
Implement channel accessors and `lerp_color` with mode-specific tests.
'''
