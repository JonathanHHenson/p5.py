[my_pbi]
title = "Complete native typography and font reference parity"
description = '''
As a p5-py sketch author working with text-heavy sketches,
I want the remaining Python-relevant text metrics, text properties, and font outline APIs,
So that text layout and typographic sketches can be portable across headless and interactive native canvas runs.
'''
acceptance_criteria = '''
Text APIs classified as partial in the reference inventory are implemented or explicitly deferred based on native canvas text capabilities. Coverage includes font ascent/descent/width/bounds helpers, `text_bounds`, `text_direction`, `text_wrap`, `text_weight`, `text_properties`, `text_property`, and feasible Font outline/path helpers. Metrics are deterministic in bounded/headless tests, documentation describes platform/font limitations, and any expensive text measurement caches are designed to avoid unbounded growth.
'''
priotity = 'high'
status = 'TODO'

