[my_pbi]
title = "Add an optional Rust acceleration build pipeline"
description = '''
As a maintainer,
I want Rust acceleration to be neatly contained and simple to build,
So that performance can improve without complicating the Python API.
'''
acceptance_criteria = '''
A `crates/p5_accel` Rust crate builds through a documented `maturin` pipeline into `p5_py.rust._accelerated`. The package remains usable with Python fallbacks when the extension is unavailable.
'''
priotity = 'medium'

[my_pbi.task_1]
order = 1
description = '''
Create Rust crate structure with `pyo3` and a minimal health-check function.
'''

[my_pbi.task_2]
order = 2
description = '''
Configure `pyproject.toml` for maturin builds and optional workflows.
'''

[my_pbi.task_3]
order = 3
description = '''
Implement Python import fallback logic and tests.
'''

[my_pbi.task_4]
order = 4
description = '''
Document local Rust build, test, and packaging commands.
'''
