[my_pbi]
title = "Implement random and noise APIs"
description = '''
As a generative artist,
I want p5-style random and noise functions,
So that procedural sketches behave predictably and can be seeded.
'''
acceptance_criteria = '''
`random`, `random_seed`, `random_gaussian`, `noise`, `noise_seed`, and `noise_detail` support p5-style call patterns, deterministic seeding, and documented fidelity expectations.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Implement p5-style `random` overloads.
'''

[my_pbi.task_2]
order = 2
description = '''
Implement gaussian random behavior with seed support.
'''

[my_pbi.task_3]
order = 3
description = '''
Implement Perlin noise with seed and detail controls.
'''

[my_pbi.task_4]
order = 4
description = '''
Prepare noise implementation for optional Rust acceleration with parity tests.
'''
