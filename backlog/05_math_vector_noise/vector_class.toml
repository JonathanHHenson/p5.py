[my_pbi]
title = "Implement the Vector class"
description = '''
As a sketch author,
I want a p5.Vector-like class with Python conveniences,
So that geometry, motion, and physics sketches are easy to write.
'''
acceptance_criteria = '''
`Vector` and `create_vector` support p5-style mutable methods, static helpers, 2D/3D operations, operator overloads, iteration, equality semantics, and angle-mode-aware heading/rotation behavior.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Implement Vector construction, copying, representation, tuple/list conversion, and x/y/z storage.
'''

[my_pbi.task_2]
order = 2
description = '''
Implement p5-style mutating methods including add, sub, mult, div, normalize, limit, heading, rotate, dot, cross, dist, and lerp.
'''

[my_pbi.task_3]
order = 3
description = '''
Implement static helpers and Python operator overloads.
'''

[my_pbi.task_4]
order = 4
description = '''
Add comprehensive vector unit tests.
'''
