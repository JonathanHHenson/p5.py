[my_pbi]
title = "Implement p5-style math helpers"
description = '''
As a sketch author,
I want familiar p5 math utilities,
So that numerical sketch code can be ported with minimal friction.
'''
acceptance_criteria = '''
`map_value`, `constrain`, `norm`, `lerp`, `dist`, `mag`, angle conversion helpers, and selected trig wrappers work with angle mode where applicable. Trivial Python built-ins are not duplicated unless compatibility requires it.
'''
priotity = 'medium'

[my_pbi.task_1]
order = 1
description = '''
Implement non-trivial math helpers and document omitted built-in equivalents.
'''

[my_pbi.task_2]
order = 2
description = '''
Provide compatibility aliases such as `map` carefully.
'''

[my_pbi.task_3]
order = 3
description = '''
Add numerical precision and edge-case tests.
'''
