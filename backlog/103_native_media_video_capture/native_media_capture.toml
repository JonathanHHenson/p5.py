[my_pbi]
title = "Implement native media element and capture APIs"
description = '''
As a multimedia sketch author,
I want Python-native audio, video, microphone, and camera APIs,
So that I can work with media devices without DOM assumptions while understanding platform and privacy constraints.
'''
acceptance_criteria = '''
The project defines or implements Python-native replacements for `create_audio`, `create_video`, and `create_capture` with explicit lifecycle and capability semantics. Privacy, permission, and platform implications are documented, optional dependencies are justified, and unsupported environments fail predictably.
'''
priotity = 'low'
status = 'IN_PROGRESS'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Design Python-native media object APIs and lifecycle behavior for audio playback elements, video playback elements, and capture devices.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Evaluate and choose native dependency paths for camera capture, microphone capture, and media decoding, keeping optional extras separate from the core install when appropriate.
'''

[my_pbi.task_3]
order = 3
status = 'IN_PROGRESS'
description = '''
Implement or stage `create_audio`, `create_video`, and `create_capture` with clear capability gating, permission handling guidance, and predictable headless behavior.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Add documentation, examples, and tests covering privacy notes, device absence, denied permissions, and other platform-specific failure modes.
'''
