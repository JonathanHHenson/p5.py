[my_pbi]
title = "Implement p5_canvas assets, pixels, compositing, and export on the GPU renderer"
description = '''
As a sketch author using assets and pixel APIs,
I want images, text, pixels, blending, erase, and save operations to be implemented on top of the GPU renderer,
So that the Rust canvas backend grows feature coverage without returning to CPU rasterization as the main rendering path.
'''
acceptance_criteria = '''
After the GPU foundation, primitive renderer, and GPU presentation path are in place, the Rust canvas backend supports image drawing with GPU texture upload/caching, GPU text rendering through a glyph atlas, explicit GPU readback/update for pixel APIs, GPU compositing and advertised blend modes, `erase`/`no_erase`, and `save_canvas` export from GPU textures with top-left physical RGBA semantics. Tests compare deterministic readback/export behavior against Pillow where practical and document accepted text/font tolerances.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Gate this PBI on completion of the GPU renderer foundation, GPU primitive pipelines, and GPU surface/offscreen presentation PBIs so new asset/pixel features are not added to the interim CPU renderer.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Design and implement the Python-to-Rust image bridge for GPU rendering, including RGBA upload, texture cache identity/versioning, source-rectangle cropping, sampling modes, alpha compositing, and transformed destination rectangles.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Choose and implement the Rust text stack for font loading, shaping, metrics, glyph rasterization, GPU glyph-atlas upload, `text_width`, `text_ascent`, and `text_descent`, documenting platform/font differences from Pillow and Pyglet.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Implement `load_pixels` and `update_pixels` through explicit GPU readback and upload staging, preserving top-left-oriented physical RGBA buffers, exact buffer length validation, and correct behavior after subsequent GPU drawing.
'''

