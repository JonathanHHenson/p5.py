[my_pbi]
title = "Implement p5_canvas assets, pixels, compositing, and export on the GPU renderer"
description = '''
As a sketch author using assets and pixel APIs,
I want images, text, pixels, blending, erase, and save operations to be implemented on top of the GPU renderer,
So that the Rust canvas backend grows feature coverage without returning to CPU rasterization as the main rendering path.
'''
acceptance_criteria = '''
After the GPU foundation, primitive renderer, and GPU presentation path are in place, the Rust canvas backend supports image drawing with GPU texture upload/caching, GPU text rendering through a glyph atlas, explicit GPU readback/update for pixel APIs, GPU compositing and advertised blend modes, `erase`/`no_erase`, and `save_canvas` export from GPU textures with top-left physical RGBA semantics. Tests compare deterministic readback/export behavior against Pillow where practical and document accepted text/font tolerances. New asset, pixel, compositing, and export features preserve the ordinary-frame GPU fast path by avoiding eager full-canvas CPU parity-buffer updates or implicit readbacks outside explicit pixel/export APIs.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Gate this PBI on completion of the GPU renderer foundation, GPU primitive pipelines, and GPU surface/offscreen presentation PBIs so new asset/pixel features are not added to the interim CPU renderer.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Design and implement the Python-to-Rust image bridge for GPU rendering, including RGBA upload, texture cache identity/versioning, source-rectangle cropping, sampling modes, alpha compositing, and transformed destination rectangles.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Choose and implement the Rust text stack for font loading, shaping, metrics, glyph rasterization, GPU glyph-atlas upload, `text_width`, `text_ascent`, and `text_descent`, documenting platform/font differences from Pillow and Pyglet.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Implement `load_pixels` and `update_pixels` through explicit GPU readback and upload staging, preserving top-left-oriented physical RGBA buffers, exact buffer length validation, and correct behavior after subsequent GPU drawing. Keep CPU-visible pixel data lazily synchronized so ordinary draw calls can mark the parity buffer stale instead of rewriting it every frame.
'''

[my_pbi.task_5]
order = 5
status = 'DONE'
description = '''
Implement `blend_region` on GPU textures for canvas and image sources, including source cropping, destination scaling, clipping, HiDPI physical-pixel handling, and p5 top-left coordinate semantics.
'''

[my_pbi.task_6]
order = 6
status = 'DONE'
description = '''
Implement GPU blend modes `BLEND`, `REPLACE`, `ADD`, `DARKEST`, `LIGHTEST`, `DIFFERENCE`, `EXCLUSION`, `MULTIPLY`, and `SCREEN`, plus `erase`/`no_erase` alpha behavior, with parity tests against the Pillow reference.
'''

[my_pbi.task_7]
order = 7
status = 'DONE'
description = '''
Implement `save_canvas`/renderer `save` export from GPU textures via explicit readback, preserving physical HiDPI output dimensions, RGBA channel order, and deterministic file output for headless tests. Ensure export readback does not become part of normal presentation or ordinary draw-frame completion.
'''

[my_pbi.task_8]
order = 8
status = 'DONE'
description = '''
Update capability flags so `canvas` advertises text, images, pixels, pixel readback/update, export, and blend modes only as each GPU-backed feature reaches tested support.
'''

[my_pbi.task_9]
order = 9
status = 'DONE'
description = '''
Run the opt-in canvas performance benchmarks after adding images, text, pixels, blend modes, or export support, and investigate any regression where common primitive-heavy scenes stop outperforming the current Pyglet backend.
'''
