[my_pbi]
title = "Implement the headless and Pillow 2D renderer"
description = '''
As a test author,
I want deterministic offscreen rendering,
So that drawing behavior can be validated without opening a window.
'''
acceptance_criteria = '''
A headless Pillow-backed renderer can create a canvas, clear/background it, draw initial primitives, expose an image buffer, and save output. It passes renderer contract tests and can run in CI.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Implement a Pillow canvas surface and renderer class conforming to the renderer protocol.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Support frame begin/end, background, clear, image export, and buffer inspection.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Add golden-image test infrastructure with configurable pixel tolerance.
'''
