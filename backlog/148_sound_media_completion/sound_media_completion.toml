[my_pbi]
title = "Complete native sound and media parity beyond the core reference"
description = '''
As a p5-py sketch author using local sound, video, and capture assets,
I want the partial and deferred media capabilities to be resolved through native Python/runtime designs,
So that media sketches behave predictably outside the browser and package capability errors remain actionable.
'''
acceptance_criteria = '''
Compatibility matrix entries for sound, sound playback, sound analysis, sound synthesis, media playback, and media capture are implemented, split into explicit native milestones, or documented as deferred/excluded. Local-file audio/video workflows remain Python-native and avoid browser DOM/media element semantics. Capture APIs address privacy, platform dependencies, and optional extras. Tests cover supported local playback/capture wrappers, missing capability failures, and documentation describes dependency, packaging, and privacy implications.
'''
priotity = 'medium'
status = 'TODO'

