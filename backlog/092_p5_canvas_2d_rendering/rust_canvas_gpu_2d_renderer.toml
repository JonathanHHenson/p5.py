[my_pbi]
title = "Replace p5_canvas primitive rendering with GPU pipelines"
description = '''
As a sketch author,
I want core p5 2D primitives to render through GPU pipelines,
So that the Rust canvas backend delivers the performance expected from a bespoke native renderer before additional feature work continues.
'''
acceptance_criteria = '''
The `canvas` backend can render frame lifecycle, background, clear, point, line, polygon, ellipse, arc, transformed geometry, fill/stroke state, stroke weight, and pixel-density mapping through `wgpu` render passes for both offscreen/headless and interactive targets. Ordinary drawing does not read pixels back to the CPU. Parity tests compare explicit GPU readback against the Pillow reference within documented tolerances, and benchmarks demonstrate the intended performance direction against the existing Pillow/Pyglet paths.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Implement GPU render pipelines, shaders, bind-group layouts, vertex/index buffers, and per-frame buffer management for solid-color p5 primitive rendering.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Implement or integrate path tessellation for filled and stroked points, lines, polygons, ellipses, and arcs, preserving p5 close/open path behavior, stroke weight, joins/caps where supported, and affine transforms.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Map logical top-left p5 coordinates into GPU render-target coordinates for all primitive draws, including HiDPI physical backing sizes and resize behavior.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Implement GPU-backed `begin_frame`, `end_frame`, `background`, and `clear` semantics for offscreen textures and window surfaces without per-frame CPU rasterization.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Add explicit GPU readback utilities for tests and compatibility APIs, preserving top-left-oriented physical RGBA buffers and avoiding readback during ordinary presentation.
'''

[my_pbi.task_6]
order = 6
status = 'TODO'
description = '''
Add renderer contract tests, Pillow parity tests, and benchmark tests for the GPU primitive path, including dense primitive scenes, transforms, HiDPI canvases, and invalid canvas argument errors.
'''

[my_pbi.task_7]
order = 7
status = 'TODO'
description = '''
Update `CanvasRenderer` capability flags and internal routing so the GPU primitive path is the target implementation and the completed CPU path is not extended with new feature work.
'''
