[my_pbi]
title = "Close core 2D, color, typography, image, and transform reference gaps"
description = '''
As a p5-py sketch author,
I want high-value non-browser 2D p5.js reference concepts to exist as Pythonic snake_case APIs,
So that common p5.js examples translate to p5-py with clear Python-native names.
'''
acceptance_criteria = '''
The non-browser 2D reference gaps are implemented or explicitly classified. Coverage includes spline/curve APIs, contour/custom-shape APIs, color component helpers, clipping and tint APIs, additional typography metrics/properties, image creation/display/pixel helpers, canvas graphics/framebuffer equivalents where appropriate, and transform helpers for 3D rotation calls that make sense in the native runtime. APIs use snake_case names only, and deterministic tests cover headless/offscreen behavior.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Add spline and custom-shape compatibility: `spline`, `spline_point`, `spline_tangent`, `spline_vertex`, `begin_contour`, `end_contour`, and shape-property APIs where they map cleanly to the current 2D renderer.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Add color reading and mutation helpers such as `red`, `green`, `blue`, `alpha`, `hue`, `saturation`, `brightness`, `lightness`, `palette_lerp`, and `Color` mutation/string/contrast methods where compatible with p5-py's `Color` model.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Add clipping/tint/image APIs that are backend-safe: `begin_clip`, `clip`, `end_clip`, `tint`, `no_tint`, `create_image`, canvas/image `get`, `set`, `copy`, `filter`, and save/frame export helpers as appropriate.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Add typography gaps including font ascent/descent/width/bounds helpers, `text_bounds`, `text_direction`, `text_wrap`, `text_weight`, and batch `text_properties` / `text_property` APIs where native text support can provide deterministic behavior.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Evaluate `create_graphics`, framebuffer-like offscreen drawing, `no_canvas`, and `drawing_context` against the canvas-required runtime, then implement Python-native equivalents or document why they remain deferred/excluded.
'''
