[my_pbi]
title = "Audit beta p5.js reference coverage and compatibility policy"
description = '''
As a maintainer,
I want an explicit p5.js beta-reference gap audit for p5-py,
So that future compatibility work is planned by category instead of discovered ad hoc from user sketches.
'''
acceptance_criteria = '''
A machine-readable compatibility inventory compares the beta p5.js reference against p5-py's public snake_case APIs. Each reference entry is classified as supported, partial, deferred, excluded, Pythonic equivalent, or not applicable. The audit distinguishes browser-only p5.js features from native Python implementation gaps, preserves existing exclusions for DOM, p5.XML, p5.Table, and p5.TableRow, and is documented in the technical docs.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Create a durable compatibility inventory source that records beta p5.js reference names, p5-py snake_case names, status, owning module, notes, and backlog follow-up when applicable.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Add a validation script or test that checks exported p5-py APIs against the compatibility inventory, verifies the public function API remains snake_case-only, and fails when status metadata becomes stale.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Update `COMPATIBILITY_MATRIX` and technical docs so each major reference group has an explicit compatibility status and rationale.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Document the non-goals and exclusions identified by the audit, including DOM, browser storage, browser URL helpers, p5.XML, p5.Table, p5.TableRow, and browser-only accessibility-output APIs.
'''
