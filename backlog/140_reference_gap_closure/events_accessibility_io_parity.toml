[my_pbi]
title = "Clarify event, accessibility, and IO compatibility gaps"
description = '''
As a p5-py maintainer,
I want event, accessibility, and IO APIs from the beta reference to be either native and tested or clearly unsupported,
So that browser-specific expectations do not leak into the native Python runtime.
'''
acceptance_criteria = '''
Keyboard, pointer, touch, motion/device, accessibility-output, and IO APIs are audited against native runtime capabilities. Supported event callbacks and state values are documented and tested. Browser/device APIs that cannot be implemented natively are exposed as clear stubs only when helpful for compatibility, and otherwise remain intentionally excluded.
'''
priotity = 'medium'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Complete pointer and keyboard parity where supported by the canvas runtime: `mouse_clicked`, `double_clicked`, `mouse_dragged`, `mouse_moved`, `mouse_wheel`, `key_pressed`, `key_released`, `key_typed`, `win_mouse_x/y`, previous window mouse values, button constants, and `code` semantics.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Document and test current touch behavior, then decide whether pointer-lock APIs should be explicit unsupported stubs or omitted as browser-only.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Classify acceleration/orientation APIs as deferred or excluded unless a native sensor provider is selected; add package-specific errors for common p5.js names if needed.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Classify accessibility helpers such as `describe`, `describe_element`, `grid_output`, and `text_output` for a native Python canvas; document any planned metadata or testing hooks separately from browser screen-reader DOM output.
'''

[my_pbi.task_5]
order = 5
status = 'DONE'
description = '''
Add IO helpers for local text/bytes/JSON and writer workflows where Python-native behavior is useful, and preserve explicit exclusions for browser Blob, client-side save, XML, Table, and TableRow APIs.
'''
