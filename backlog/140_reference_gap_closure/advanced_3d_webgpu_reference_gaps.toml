[my_pbi]
title = "Classify advanced 3D, shader, WebGPU, and geometry reference gaps"
description = '''
As a maintainer,
I want beta p5.js 3D and shader APIs to be separated into practical native milestones and explicit non-goals,
So that p5-py can improve 3D compatibility without overcommitting to browser WebGL/WebGPU semantics.
'''
acceptance_criteria = '''
Advanced reference gaps are classified and planned across software 3D, native GPU canvas, shaders, p5.Geometry-like values, camera controls, lighting/materials, framebuffer/offscreen rendering, WebGPU/strands, and model import/export. The docs make clear which APIs are supported, partial, deferred, or excluded in p5-py and why. Any new public stubs raise package-specific errors with actionable messages.
'''
priotity = 'medium'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Audit missing 3D primitives and geometry APIs including `cone`, `cylinder`, `ellipsoid`, `torus`, `build_geometry`, `create_model`, `save_obj`, `save_stl`, `free_geometry`, and p5.Geometry methods/properties.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Audit missing camera/projection and interaction APIs such as `frustum`, `set_camera`, `roll`, `debug_mode`, `no_debug_mode`, line perspective, and screen/world coordinate conversions.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Audit missing light/material APIs including `lights`, `no_lights`, `spot_light`, `image_light`, `panorama`, `light_falloff`, `specular_color`, `emissive_material`, `metalness`, `texture_mode`, and `texture_wrap`.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Classify WebGPU, p5.strands, storage-buffer, compute-shader, and framebuffer APIs as deferred or excluded unless the Rust canvas runtime grows a native GPU abstraction that can support them safely.
'''

[my_pbi.task_5]
order = 5
status = 'DONE'
description = '''
Update shader docs and compatibility stubs for p5.Shader methods that do not map to the current shader implementation, including hook inspection/modification and context-copy semantics.
'''
