[my_pbi]
title = "Add math, data, time/date, and environment parity helpers"
description = '''
As a user porting p5.js sketches to Python,
I want small utility APIs and environment values to be available when they are meaningful outside the browser,
So that compatibility work is not blocked by missing simple helpers.
'''
acceptance_criteria = '''
Native Python equivalents are added or explicitly classified for missing math calculation helpers, p5.Vector methods, quaternion helpers, data conversion/formatting helpers, time/date helpers, environment values, and print/URL/storage alternatives. Browser-only helpers such as URL path/query and localStorage are either excluded with clear package-specific errors or mapped to explicit Python-native alternatives with documentation.
'''
priotity = 'medium'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Add missing math calculation helpers such as `abs`, `ceil`, `exp`, `floor`, `log`, `pow`, `round`, `sqrt`, and p5-compatible snake_case naming for existing `min`, `max`, and `map` behavior without shadowing Python built-ins unexpectedly.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Add missing `Vector` parity methods such as indexed getters/setters, modulo/remainder, equality helpers, clamp-to-zero, spherical interpolation, random vectors, and static constructors where compatible with p5-py's vector model.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Evaluate and add quaternion helpers if needed for 3D camera/model work, including axis-angle construction, multiplication, and rotation application.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Add p5-style data conversion and formatting utilities such as `boolean`, `byte`, `char`, `float`, `hex`, `int`, `str`, `unchar`, `unhex`, `nf`, `nfc`, `nfp`, `nfs`, `shuffle`, and `split_tokens` where they provide real compatibility value.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
Add time/date and environment helpers such as `day`, `month`, `year`, `hour`, `minute`, `second`, `get_target_frame_rate`, `window_width`, `window_height`, display dimensions, focus state, cursor/no_cursor, and package-specific stubs for browser URL/storage APIs.
'''
