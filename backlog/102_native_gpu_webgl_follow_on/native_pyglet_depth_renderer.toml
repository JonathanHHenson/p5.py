[my_pbi]
title = "Implement a native depth-tested Pyglet WEBGL renderer"
description = '''
As a p5-py user,
I want the Pyglet backend to render WEBGL sketches through a native depth-tested GPU path,
So that interactive 3D sketches can scale beyond the current software projection milestone.
'''
acceptance_criteria = '''
A Pyglet-hosted native 3D renderer can open a depth-capable context, render at least a triangle or cube with logical canvas sizing, and integrate through the existing backend/renderer capability gates without regressing the software WEBGL fallback.
'''
priotity = 'high'
status = 'TODO'

