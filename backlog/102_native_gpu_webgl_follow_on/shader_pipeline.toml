[my_pbi]
title = "Implement shader loading, binding, and uniform APIs"
description = '''
As an advanced graphics user,
I want native Python shader APIs,
So that I can customize rendering without relying on browser WebGL concepts.
'''
acceptance_criteria = '''
`load_shader`, `create_shader`, `shader`, and `reset_shader` work on the native 3D renderer. Uniform values support the documented scalar/vector/matrix types, shader compilation errors are package-specific and actionable, and tests cover loading, binding, uniform updates, and capability gating.
'''
