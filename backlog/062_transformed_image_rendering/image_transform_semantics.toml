[my_pbi]
title = "Fix image transform and pivot semantics"
description = '''
As a sketch author,
I want `image()` to honor p5-style matrix transforms and image modes,
So that sprites rotate, scale, and translate around the expected local origin without per-sketch bitmap workarounds.
'''
acceptance_criteria = '''
`image()` draws transformed bitmaps consistently across supported renderers. `image_mode(CENTER)`, `image_mode(CORNER)`, scaled image draws, and source/destination image overloads honor the active transform matrix so `translate(x, y); rotate(angle); image(sprite, 0, 0, w, h)` rotates around the intended local origin. The Asteroids-style `examples/input_spaceship.py` can use matrix transforms for ship, laser, and asteroid sprites without cached pre-rotated bitmap frames. Behavior is covered by deterministic headless tests and focused native Pyglet tests or documented capability limits.
'''
priotity = 'high'
status = 'TODO'

