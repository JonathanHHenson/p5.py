[my_pbi]
title = "Plan and implement native shader, WebGPU, strands, and storage-buffer parity"
description = '''
As a p5-py maintainer and advanced sketch author,
I want shader and GPU-compute reference gaps to be resolved through a safe native GPU design,
So that p5-py can support advanced rendering without pretending browser WebGPU/WebGL internals exist in Python.
'''
acceptance_criteria = '''
Shader APIs currently classified as partial and WebGPU/strands/storage-buffer/compute APIs currently classified as deferred are either implemented on a native Rust GPU abstraction or explicitly excluded/deferred with actionable errors. Shader object parity includes uniform handling, version reporting, context-copy decisions, hook inspection/modification decisions, filter/image/stroke shader variants where feasible, and documentation of differences from p5.js. WebGPU, storage buffers, and compute shader APIs are implemented only if the Rust canvas runtime provides a safe native abstraction. Tests cover shader creation, uniforms, failure modes, and any GPU-compute readback behavior.
'''
priotity = 'medium'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Audit current `p5.assets.shader`, `CanvasRenderer`, and Rust canvas shader capabilities against p5.Shader, filter shader, image shader, stroke shader, and material shader reference entries.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Implement or explicitly classify p5.Shader-like methods including `set_uniform`, `version`, `copy_to_context`, `inspect_hooks`, and `modify` using Pythonic snake_case names.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Design native shader variant APIs for filter, image, stroke, color, material, and normal shaders without exposing browser GLSL/WebGL context assumptions.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Decide whether a Rust native GPU abstraction can safely support WebGPU-like storage buffers and compute shaders; if not, keep WebGPU, p5.strands, storage buffers, and compute APIs explicitly deferred or excluded.
'''

[my_pbi.task_5]
order = 5
status = 'TODO'
description = '''
If native compute support is accepted, implement storage buffer creation/update/readback and compute dispatch with clear synchronization and privacy/resource limits.
'''

[my_pbi.task_6]
order = 6
status = 'TODO'
description = '''
Add package-specific unsupported stubs for common advanced shader/WebGPU names that users are likely to try before native support exists.
'''

[my_pbi.task_7]
order = 7
status = 'TODO'
description = '''
Add shader and GPU tests that cover supported paths, missing capability errors, shader compile failures, uniform validation, and deterministic headless behavior where possible.
'''

[my_pbi.task_8]
order = 8
status = 'TODO'
description = '''
Document security, platform, performance, and packaging implications for any native GPU compute support, and update the compatibility inventory.
'''
