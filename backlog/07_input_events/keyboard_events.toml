[my_pbi]
title = "Implement keyboard state and callbacks"
description = '''
As a interactive sketch author,
I want keyboard state and callbacks,
So that sketches can respond to typed input and key presses.
'''
acceptance_criteria = '''
Key, key code, pressed state, `key_is_down`, and callbacks for pressed, released, and typed are supported with normalized event objects and documented key-code behavior.
'''
priotity = 'high'

[my_pbi.task_1]
order = 1
description = '''
Define keyboard event dataclasses, key constants, and input state fields.
'''

[my_pbi.task_2]
order = 2
description = '''
Normalize backend keyboard events into state updates and callback dispatch.
'''

[my_pbi.task_3]
order = 3
description = '''
Implement `key_is_down` and p5.js-compatible aliases.
'''

[my_pbi.task_4]
order = 4
description = '''
Add synthetic event tests.
'''
