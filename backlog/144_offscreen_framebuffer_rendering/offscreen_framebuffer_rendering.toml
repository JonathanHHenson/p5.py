[my_pbi]
title = "Design and implement native offscreen graphics and framebuffer APIs"
description = '''
As a p5-py sketch author composing layered or GPU-backed sketches,
I want Python-native offscreen graphics and framebuffer capabilities,
So that sketches can render into intermediate targets without exposing browser canvas internals.
'''
acceptance_criteria = '''
The deferred offscreen rendering entries are resolved with a native design and implementation plan. `create_graphics`, framebuffer-like APIs, and any `drawing_context` substitute preserve backend/renderer boundaries and do not expose Rust internals in public APIs. `no_canvas` is either implemented with a clear canvas-runtime meaning or remains explicitly excluded/deferred with documentation. Headless tests cover offscreen drawing, readback, resizing, pixel density, and resource cleanup; performance-sensitive paths avoid unnecessary GPU/CPU readbacks.
'''
priotity = 'high'
status = 'TODO'

