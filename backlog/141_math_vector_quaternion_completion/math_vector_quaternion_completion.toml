[my_pbi]
title = "Complete Pythonic math, vector, and quaternion reference parity"
description = '''
As a p5-py sketch author porting p5.js math-heavy sketches,
I want the remaining Python-relevant math, Vector, and quaternion APIs to be implemented with Pythonic names,
So that geometry, animation, camera, and model workflows do not require ad hoc compatibility code.
'''
acceptance_criteria = '''
All remaining Python-relevant math/vector/quaternion entries in the reference compatibility inventory are implemented, reclassified as supported/Pythonic equivalent, or explicitly documented as out of scope. Vector parity includes angle_between, set_heading, get_value/set_value, to_string-style formatting, and any remaining snake_case equivalents. Quaternion helpers include axis-angle construction, multiplication, and rotation application if they are needed by 3D camera/model workflows. Public package exports remain snake_case-only, deterministic unit tests cover numeric edge cases, and hot-path vector operations avoid unnecessary allocations where mutation semantics allow it.
'''
priotity = 'medium'
status = 'TODO'

