order = 1
status = 'TODO'
description = '''
Define the GPU parity checklist for replacing both current interactive and headless modes, including primitive rendering, image/text behavior, pixels/compositing, event handling, HiDPI behavior, readback/export, examples, packaging, and performance thresholds.
'''

