[my_pbi]
title = "Support transforms, paths, and curves in the native Pyglet renderer"
description = '''
As a creative coder,
I want transformed shapes and custom paths to render natively in Pyglet,
So that interactive sketches preserve p5-style geometry behavior without falling back to Pillow.
'''
acceptance_criteria = '''
The native Pyglet renderer supports transform matrices, custom polygon paths, partial shape construction, quadratic curves, Bezier curves, and arc paths using shared geometry flattening where needed. Behavior is covered by tests or documented as partial where exact parity is not feasible yet.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Apply p5-py affine transform matrices to native Pyglet drawing coordinates consistently.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Reuse shared geometry flattening for Bezier and quadratic curves until a more advanced path renderer is introduced.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Implement native drawing for `begin_shape`, `vertex`, `quadratic_vertex`, `bezier_vertex`, and `end_shape` paths.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Add tests or visual examples comparing native Pyglet paths against the headless Pillow renderer for representative shapes.
