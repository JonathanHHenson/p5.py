[my_pbi]
title = "Migrate PygletBackend from Pillow bridge to native renderer"
description = '''
As a maintainer,
I want the Pyglet backend to use the native renderer by default,
So that the bridge renderer becomes an implementation detail or fallback rather than the primary interactive path.
'''
acceptance_criteria = '''
`PygletBackend` uses `PygletRenderer` by default, the old Pillow bridge behavior is removed or retained only as an explicit fallback, examples run interactively with native rendering, and documentation reflects the new default rendering path.
'''
priotity = 'high'
status = 'TODO'

