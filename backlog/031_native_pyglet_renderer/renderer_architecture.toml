[my_pbi]
title = "Design the native Pyglet renderer architecture"
description = '''
As a p5-py maintainer,
I want the Pyglet backend to use a native Pyglet renderer instead of presenting a Pillow raster buffer,
So that interactive sketches render with better performance, sharper output, and a cleaner backend architecture.
'''
acceptance_criteria = '''
A documented architecture separates Pyglet window/event-loop responsibilities from native Pyglet drawing responsibilities. The renderer contract identifies which APIs are supported natively, which are delegated to shared geometry helpers, and which remain capability-gated.
'''
priotity = 'high'
status = 'TODO'

[my_pbi.task_1]
order = 1
status = 'TODO'
description = '''
Document the current Pyglet bridge backend and the target architecture with distinct `PygletBackend` and `PygletRenderer` responsibilities.
'''

[my_pbi.task_2]
order = 2
status = 'TODO'
description = '''
Define how the native Pyglet renderer will implement the existing `Renderer` protocol without leaking Pyglet-specific concepts into `SketchContext` or public APIs.
'''

[my_pbi.task_3]
order = 3
status = 'TODO'
description = '''
Define capability flags for native Pyglet features, partial support, and fallbacks such as export or pixel APIs.
'''

[my_pbi.task_4]
order = 4
status = 'TODO'
description = '''
Decide whether the native renderer should use Pyglet shapes, batched vertex lists, direct OpenGL, or a hybrid approach for the first implementation.
'''
