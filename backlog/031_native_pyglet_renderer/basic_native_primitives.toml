[my_pbi]
title = "Implement native Pyglet drawing for basic primitives"
description = '''
As a interactive sketch author,
I want basic shapes to draw directly through Pyglet,
So that sketches do not rely on an upscaled Pillow image during interactive rendering.
'''
acceptance_criteria = '''
The Pyglet backend uses a native `PygletRenderer` for `point`, `line`, `rect`, `square`, `ellipse`, `circle`, `triangle`, `quad`, and `arc` where feasible. Fill, stroke, stroke weight, and basic modes match the renderer contract tests within documented tolerances.
'''
priotity = 'high'
status = 'TODO'

