[my_pbi]
title = "Define pixel, export, and fallback behavior for native Pyglet rendering"
description = '''
As a sketch author,
I want pixel APIs and image export to behave predictably with the native Pyglet renderer,
So that interactive rendering improvements do not break existing p5-py workflows.
'''
