[my_pbi]
title = "Preserve HiDPI behavior in native Pyglet rendering"
description = '''
As a Retina or HiDPI display user,
I want native Pyglet rendering to remain sharp and coordinate-correct,
So that replacing the Pillow bridge does not regress visual quality.
'''
acceptance_criteria = '''
The native Pyglet renderer respects logical canvas coordinates, physical framebuffer size, display density, and explicit pixel-density settings. Existing HiDPI tests are adapted or expanded for the native renderer.
'''
priotity = 'high'
status = 'TODO'

