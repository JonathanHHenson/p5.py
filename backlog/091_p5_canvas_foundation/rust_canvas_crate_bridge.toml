[my_pbi]
title = "Create the p5_canvas Rust crate and Python bridge"
description = '''
As a p5-py maintainer,
I want a dedicated Rust crate and Python adapter layer for the future canvas backend,
So that rendering and runtime work can move into Rust without changing the public sketch API.
'''
acceptance_criteria = '''
A new `crates/p5_canvas` Rust crate exists and exposes a minimal `p5.rust._canvas` PyO3 module. Python wrapper code can detect whether the module is available, report a health check, and raise a clear package-specific capability error when the `canvas` backend is selected without the extension. The crate/build approach coexists with the existing `p5_accel` extension and is documented.
'''
priotity = 'high'
status = 'DONE'

[my_pbi.task_1]
order = 1
status = 'DONE'
description = '''
Evaluate the Rust crate/build layout for adding `p5_canvas` alongside `p5_accel`, including whether to use a Cargo workspace, multiple maturin commands, or a combined extension module.
'''

[my_pbi.task_2]
order = 2
status = 'DONE'
description = '''
Create `crates/p5_canvas` with PyO3 module scaffolding, a health-check function, Rust unit-test setup, and package metadata consistent with the existing Rust acceleration crate.
'''

[my_pbi.task_3]
order = 3
status = 'DONE'
description = '''
Add a Python wrapper module under `src/p5/rust/` that imports `p5.rust._canvas` when available and preserves package importability when the compiled module is absent.
'''

[my_pbi.task_4]
order = 4
status = 'DONE'
description = '''
Add initial `CanvasBackend` and `CanvasRenderer` adapter skeletons that implement the existing backend/renderer protocols and raise clear capability errors for unimplemented operations.
'''

[my_pbi.task_5]
order = 5
status = 'DONE'
description = '''
Register the opt-in `canvas` backend without changing default backend behavior, and add tests for backend discovery, unavailable-extension errors, and capability flags.
'''

[my_pbi.task_6]
order = 6
status = 'DONE'
description = '''
Document local build, test, and packaging commands for `p5_canvas`, including how they interact with `uv`, maturin, and the existing optional Rust acceleration module.
'''
