[my_pbi]
title = "Define sound and media support strategy"
description = '''
As a p5.js user,
I want to know whether sound and media APIs are available,
So that I can plan audio-reactive and media sketches.
'''
acceptance_criteria = '''
The project has a documented strategy for sound loading/playback, analysis, synthesis, microphone/camera capture, and exclusions. Basic playback may be prototyped, while browser-dependent capture APIs are marked deferred or excluded.
'''
priotity = 'low'

[my_pbi.task_1]
order = 1
description = '''
Separate core p5.js APIs from p5.sound-style add-on APIs.
'''

[my_pbi.task_2]
order = 2
description = '''
Evaluate Python audio libraries for playback, volume, rate, pan, FFT, and amplitude analysis.
'''

[my_pbi.task_3]
order = 3
description = '''
Document privacy, platform, and dependency implications for microphone, camera, and capture APIs.
'''
