[my_pbi]
title = "Define model and shader API adaptation"
description = '''
As a advanced graphics user,
I want model and shader APIs that fit Python,
So that p5-py can support advanced rendering without browser assumptions.
'''
acceptance_criteria = '''
Model loading and shader APIs have a Python-native proposal, supported asset formats, backend requirements, and clear incompatibility notes for p5.js examples that assume browser/WebGL behavior.
'''
priotity = 'low'

[my_pbi.task_1]
order = 1
description = '''
Research feasible model formats and Python loaders.
'''

[my_pbi.task_2]
order = 2
description = '''
Design Python shader loading and uniform APIs around the selected rendering backend.
'''

[my_pbi.task_3]
order = 3
description = '''
Add deferred API stubs and documentation for model and shader APIs.
'''
