[my_pbi]
title = "Plan and prototype WebGL-like 3D rendering"
description = '''
As a advanced p5 user,
I want a Python equivalent for p5.js WEBGL sketches,
So that 3D creative coding can eventually be supported natively.
'''
acceptance_criteria = '''
A design document and prototype establish whether 3D rendering will use OpenGL, ModernGL, Pyglet, or another native backend. The prototype supports a minimal 3D scene or clearly documents blockers.
'''
priotity = 'low'

[my_pbi.task_1]
order = 1
description = '''
Evaluate native Python 3D rendering options.
'''

[my_pbi.task_2]
order = 2
description = '''
Define 3D renderer protocol extensions for camera, projection, lights, materials, textures, models, and shaders.
'''

[my_pbi.task_3]
order = 3
description = '''
Create a minimal prototype rendering a primitive with camera/projection controls.
'''

[my_pbi.task_4]
order = 4
description = '''
Update compatibility matrix for WEBGL-related APIs.
'''
