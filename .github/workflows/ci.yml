name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uvx maturin develop --release --manifest-path crates/p5_canvas/Cargo.toml
      - run: uv run pytest
      - run: uv run python examples/basic_shapes.py --headless --frames 1

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: uv build

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - run: uvx maturin build --release
      - run: cargo test --manifest-path crates/p5_canvas/Cargo.toml
      - run: uvx maturin build --release --manifest-path crates/p5_canvas/Cargo.toml

  canvas-extension-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: dtolnay/rust-toolchain@stable
      - run: uv sync --dev
      - run: uvx maturin develop --release --manifest-path crates/p5_canvas/Cargo.toml
      - run: uv run pytest tests/unit/test_rust_canvas.py tests/contracts/test_canvas_backend.py tests/contracts/test_canvas_renderer_parity.py
