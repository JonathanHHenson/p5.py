name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Install canvas extension
        run: uvx maturin develop --release --manifest-path crates/p5_canvas/Cargo.toml

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      - name: Check version sync
        run: uv run python scripts/bump_version.py --check

      - name: Run tests
        run: uv run pytest

      - name: Smoke test headless example
        run: uv run python examples/basic_shapes.py --headless --frames 1

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build ${{ matrix.label }} wheel
    runs-on: ${{ matrix.os }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            maturin-args: --release --out dist --interpreter /opt/python/cp312-cp312/bin/python
          - label: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            maturin-args: --release --out dist
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            maturin-args: --release --out dist
          - label: windows-x64
            os: windows-latest
            target: x64
            maturin-args: --release --out dist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Build canvas extension wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.maturin-args }}
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.label }}
          path: dist/*.whl

  check-dist:
    name: Verify distributions
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels
    permissions:
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v6

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Verify distribution metadata
        run: uv tool run twine check dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/p5-py
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: check-dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/p5-py
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
