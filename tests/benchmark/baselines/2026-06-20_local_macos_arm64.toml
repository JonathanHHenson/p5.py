[baseline]
id = "2026-06-20_local_macos_arm64"
captured_at = "2026-06-20"
git_commit = "024e0fa"
machine = "local-macos-arm64"
os = "Darwin 25.5.0 arm64"
platform = "macOS-26.5.1-arm64-arm-64bit"
python = "3.12.11"
python_executable = "/Users/jhenson/zed_projects/p5_py/.venv/bin/python3"
notes = '''
Machine-specific baseline captured from the local development machine.
Use these numbers only for comparison against subsequent runs on the same
machine/configuration, not as portable thresholds for CI or other hardware.
Canvas benchmark tests still enforce the project target that each scenario must
average at least 120 FPS; below-target measured values are recorded here to make
optimization gaps explicit.
'''

[canvas_suite]
command = "uv run pytest tests/benchmark/test_canvas_backend_perf.py --run-benchmarks -s"
frames = 120
repeats = 2
required_min_fps = 120.0
backend_mode = "headless"
canvas_size = [720, 480]
pixel_density = 1.0
gpu_available = "unknown"

